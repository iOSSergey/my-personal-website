name: CI/CD Deployment

# This workflow deploys the application with automatic SSL certificate management
# SSL certificates are managed by Let's Encrypt via certbot container
# No manual SSL certificate management required in secrets

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-22.04

    steps:
      # Checkout the repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # Set up SSH key
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # Ensure the target directory exists
      - name: Ensure target directory exists
        env:
          USERNAME: ${{ secrets.USERNAME }}
          SERVER: ${{ secrets.SERVER }}
        run: |
          ssh -o StrictHostKeyChecking=no $USERNAME@$SERVER "mkdir -p ~/dev/my-personal-website"

      # Install rsync on the server
      - name: Install rsync on Server
        env:
          USERNAME: ${{ secrets.USERNAME }}
          SERVER: ${{ secrets.SERVER }}
        run: |
          ssh -o StrictHostKeyChecking=no $USERNAME@$SERVER "sudo apt update && sudo apt install -y rsync"

      # Copy files to server
      - name: Deploy to Server
        env:
          USERNAME: ${{ secrets.USERNAME }}
          SERVER: ${{ secrets.SERVER }}
        run: |
          rsync -avz --delete \
            --exclude='.git' --exclude='.git/*' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ $USERNAME@$SERVER:~/dev/my-personal-website

      # Create .env file on the server using export
      - name: Create .env file
        env:
          USERNAME: ${{ secrets.USERNAME }}
          SERVER: ${{ secrets.SERVER }}
          DEBUG: ${{ secrets.DEBUG }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
          ALLOWED_HOSTS: ${{ secrets.ALLOWED_HOSTS }}
          CSRF_TRUSTED_ORIGINS: ${{ secrets.CSRF_TRUSTED_ORIGINS }}
          SERVER_NAME: ${{ secrets.SERVER_NAME }}
        run: |
          ssh -o StrictHostKeyChecking=no $USERNAME@$SERVER << 'EOF'
          export DEBUG="${{ secrets.DEBUG }}"
          export SECRET_KEY="${{ secrets.SECRET_KEY }}"
          export DATABASE_NAME="${{ secrets.DATABASE_NAME }}"
          export DATABASE_USER="${{ secrets.DATABASE_USER }}"
          export DATABASE_PASSWORD="${{ secrets.DATABASE_PASSWORD }}"
          export DATABASE_HOST="${{ secrets.DATABASE_HOST }}"
          export DATABASE_PORT="${{ secrets.DATABASE_PORT }}"
          export ALLOWED_HOSTS="${{ secrets.ALLOWED_HOSTS }}"
          export CSRF_TRUSTED_ORIGINS="${{ secrets.CSRF_TRUSTED_ORIGINS }}"
          export SERVER_NAME="${{ secrets.SERVER_NAME }}"

          cat <<EOT > ~/dev/my-personal-website/client_management_system.env
          DEBUG=$DEBUG
          SECRET_KEY=$SECRET_KEY
          DATABASE_NAME=$DATABASE_NAME
          DATABASE_USER=$DATABASE_USER
          DATABASE_PASSWORD=$DATABASE_PASSWORD
          DATABASE_HOST=$DATABASE_HOST
          DATABASE_PORT=$DATABASE_PORT
          ALLOWED_HOSTS=$ALLOWED_HOSTS
          CSRF_TRUSTED_ORIGINS=$CSRF_TRUSTED_ORIGINS
          SERVER_NAME=$SERVER_NAME
          EOT
          EOF

      # Initialize SSL certificates if they don't exist
      - name: Initialize SSL Certificates
        env:
          USERNAME: ${{ secrets.USERNAME }}
          SERVER: ${{ secrets.SERVER }}
        run: |
          ssh -o StrictHostKeyChecking=no $USERNAME@$SERVER << 'EOF'
            cd ~/dev/my-personal-website
            
            # Create ssl directory if it doesn't exist
            mkdir -p ssl
            
            # Load environment variables to get SERVER_NAME
            if [ -f "client_management_system.env" ]; then
              export $(grep -v '^#' client_management_system.env | xargs)
            fi
            
            # Check if real certificates already exist
            if [ -f "ssl/fullchain.pem" ] && [ -f "ssl/privkey.pem" ]; then
              # Check if certificate is not self-signed
              if openssl x509 -in ssl/fullchain.pem -text -noout | grep -q "CN = $SERVER_NAME"; then
                echo "Valid SSL certificates already exist for $SERVER_NAME"
                exit 0
              fi
            fi
            
            echo "Setting up SSL certificates for $SERVER_NAME..."
            
            # Stop all containers first
            docker compose down || true
            
            # Create temporary nginx config for ACME challenge only
            mkdir -p /tmp/nginx-acme
            cat > /tmp/nginx-acme/nginx.conf << 'NGINX_CONF'
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name $SERVER_NAME www.$SERVER_NAME;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 200 'ACME Challenge Server Running';
            add_header Content-Type text/plain;
        }
    }
}
NGINX_CONF

            # Start temporary nginx for ACME challenge
            echo "Starting temporary nginx for ACME challenge..."
            docker run -d --name temp-nginx-acme -p 80:80 \
              -v /tmp/nginx-acme/nginx.conf:/etc/nginx/nginx.conf \
              -v certbot_www:/var/www/certbot \
              nginx:latest

            # Wait for nginx to start
            sleep 5

            # Try to get real certificate from Let's Encrypt
            echo "Requesting real SSL certificate from Let's Encrypt..."
            docker run --rm \
              -v certbot_www:/var/www/certbot \
              -v /etc/letsencrypt:/etc/letsencrypt \
              certbot/certbot \
              certonly --webroot --webroot-path=/var/www/certbot \
              --email admin@$SERVER_NAME \
              --agree-tos \
              --no-eff-email \
              --non-interactive \
              --force-renewal \
              -d $SERVER_NAME \
              -d www.$SERVER_NAME

            # Clean up temporary nginx
            docker stop temp-nginx-acme 2>/dev/null || true
            docker rm temp-nginx-acme 2>/dev/null || true
            rm -rf /tmp/nginx-acme

            # Copy certificates if successful
            if [ -f "/etc/letsencrypt/live/$SERVER_NAME/fullchain.pem" ]; then
              echo "Copying real SSL certificates..."
              cp /etc/letsencrypt/live/$SERVER_NAME/fullchain.pem ./ssl/
              cp /etc/letsencrypt/live/$SERVER_NAME/privkey.pem ./ssl/
              echo "Real SSL certificates obtained successfully!"
            else
              echo "Could not obtain Let's Encrypt certificate. Creating temporary certificates."
              # Create temporary self-signed certificates
              openssl req -x509 -nodes -days 1 -newkey rsa:2048 \
                -keyout ssl/privkey.pem \
                -out ssl/fullchain.pem \
                -subj "/CN=localhost"
              echo "Temporary certificates created."
            fi
            
            # Now start the main application
            echo "Starting main application containers..."
            docker compose up -d
            
            # Wait for containers to start
            sleep 10
            
            echo "SSL setup completed!"
          EOF

      # Stop Nginx and Gunicorn if they are running
      - name: Stop Nginx and Gunicorn
        env:
          USERNAME: ${{ secrets.USERNAME }}
          SERVER: ${{ secrets.SERVER }}
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.USERNAME }}@${{ secrets.SERVER }} << 'EOF'
          if systemctl is-active --quiet nginx
          then
              sudo systemctl stop nginx
          else
              echo "Nginx is not running"
          fi

          if systemctl is-active --quiet gunicorn
          then
              sudo systemctl stop gunicorn
          else
              echo "Gunicorn is not running"
          fi
          EOF

      # Update and restart Docker Compose
      - name: Final Container Check
        env:
          USERNAME: ${{ secrets.USERNAME }}
          SERVER: ${{ secrets.SERVER }}
        run: |
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -o ServerAliveCountMax=10 $USERNAME@$SERVER << 'EOF'
          cd ~/dev/my-personal-website
          
          # Ensure all containers are running
          echo "Checking container status..."
          docker compose ps
          
          # Restart any stopped containers
          docker compose up -d
          
          echo "Deployment completed successfully!"
          EOF

      # Health check
      - name: Health Check
        env:
          USERNAME: ${{ secrets.USERNAME }}
          SERVER: ${{ secrets.SERVER }}
        run: |
          ssh -o StrictHostKeyChecking=no $USERNAME@$SERVER << 'EOF'
          cd ~/dev/my-personal-website
          
          # Wait a bit more for services to fully start
          sleep 5
          
          # Check if all containers are running
          if [ "$(docker compose ps --services --filter 'status=running' | wc -l)" -eq "$(docker compose ps --services | wc -l)" ]; then
            echo "✅ All containers are running successfully"
          else
            echo "❌ Some containers failed to start"
            docker compose logs --tail=20
            exit 1
          fi
          EOF